<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Enter PIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%); min-height: 100vh; }
        .login-card { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="card login-card shadow-lg" style="width: 400px;">
        <div class="card-body p-5 text-center">
            <h3 class="text-white mb-4"><i class="fas fa-shield-alt me-2"></i>Admin Panel</h3>
            <p class="text-muted mb-4">Enter PIN to access admin dashboard</p>
            <form method="POST" action="{% url 'admin_dashboard' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="password" name="admin_pin" class="form-control form-control-lg text-center" 
                           placeholder="Enter 6-digit PIN" maxlength="6" required 
                           style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;">
                </div>
                <button type="submit" class="btn btn-neon w-100 py-3">
                    <i class="fas fa-unlock me-2"></i>Unlock Admin Panel
                </button>
            </form>
        </div>
    </div>
</body>
</html>
