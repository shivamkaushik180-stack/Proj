{% extends 'core/base.html' %}

{% block title %}Server Error - OGTRMS{% endblock %}

{% block content %}

<section class="section-padding" style="min-height:70vh;display:flex;align-items:center;">
    <div class="container text-center">
        <div style="font-size:8rem;margin-bottom:1rem;">⚠️</div>
        
        <h1 class="display-1 fw-bold text-neon-pink mb-2">500</h1>
        
        <h2 class="mb-3">Server Error</h2>
        
        <p class="text-muted lead mb-4" style="max-width:600px;margin-left:auto;margin-right:auto;">

            Please try again later or contact support if the problem persists.
        </p>
        
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="/" class="btn btn-neon px-4 py-2">
                <i class="fas fa-home me-2"></i>Go to Homepage
            </a>
            <a href="/contact/" class="btn btn-outline-neon px-4 py-2">
                <i class="fas fa-envelope me-2"></i>Report Issue
            </a>
        </div>
    </div>
</section>

{% endblock %}
